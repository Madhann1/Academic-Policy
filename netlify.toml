[build]
  # Matching your Netlify UI setting (Base: frontend)
  command   = "npm run build"
  publish   = "dist"

# PROXY API REQUESTS TO RENDER
[[redirects]]
  from   = "/api/*"
  to     = "https://academic-policy.onrender.com/api/:splat"
  status = 200
  force  = true

# PROXY UPLOADS TO RENDER
[[redirects]]
  from   = "/uploads/*"
  to     = "https://academic-policy.onrender.com/uploads/:splat"
  status = 200
  force  = true

# React Router SPA redirect
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
